version: "3.9"

services:
  backend:
    build: ./server
    container_name: backend
    ports:
      - "5001:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: node index.js

  frontend:
    build: ./client
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
